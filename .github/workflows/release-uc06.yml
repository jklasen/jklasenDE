name: Release UC-06 (scheduled merge)

# Zweck: Veröffentlicht den bereits fertigen Beitrag RAMmageddon UC 06
# automatisch am 2026-05-22 gegen 03:00 Europe/Berlin, indem der Branch
# release/uc06-2026-05-22 nach main gemergt wird. Der bestehende
# Workflow "Deploy to Cloudflare Pages" baut/deployt main anschließend.
#
# WICHTIG (einmalige Repo-Voraussetzung):
#   schedule-Trigger feuern NUR, wenn diese Datei auf dem Default-Branch
#   (main) liegt. Dieser Workflow muss also via PR nach main gemergt
#   werden, damit der Cron aktiv wird. Das Mergen DIESES Workflows
#   veröffentlicht den Artikel NICHT — der Artikel liegt isoliert auf
#   release/uc06-2026-05-22 und wird erst durch den Datumsguard-Lauf
#   am 22.05. nach main gebracht.

on:
  schedule:
    # 01:00 UTC. Am 2026-05-22 ist Europe/Berlin in CEST (Sommerzeit,
    # UTC+2) -> 01:00 UTC = 03:00 Uhr Ortszeit. 2026-05-22 ist ein
    # Freitag, daher wöchentlich freitags; der Datumsguard unten macht
    # jeden anderen Freitag zum No-op.
    # DST-Hinweis: CEST gilt 2026 vom 29.03. bis 25.10., der 22.05.
    # liegt sicher darin. Würde Berlin auf CET (UTC+1) stehen, wäre
    # 01:00 UTC = 02:00 Ortszeit — hier irrelevant.
    # GitHub-schedule-Latenz: Cron-Läufe starten typ. 5–15 min verspätet.
    # Worst case ~01:15 UTC = ~03:15 CEST; UTC-Datum bleibt 2026-05-22
    # (rollt erst 00:00 UTC). LinkedIn-Versand 07:15 -> unkritisch.
    - cron: '0 1 * * 5'
  # Manueller Fallback + Trockenlauf-Verifikation (Datumsguard schützt).
  workflow_dispatch:

# Minimal nötige Rechte des Standard-GITHUB_TOKEN:
#   contents: write  -> Merge-Commit nach main pushen
#   actions:  write  -> deploy.yml explizit per workflow_dispatch anstoßen
permissions:
  contents: write
  actions: write

concurrency:
  group: release-uc06
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Datumsguard — nur am 2026-05-22 (UTC) handeln
        id: guard
        run: |
          TODAY="$(date -u +%F)"
          echo "Heutiges UTC-Datum: $TODAY"
          if [ "$TODAY" = "2026-05-22" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Datumsguard offen ($TODAY) — Release wird ausgeführt."
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Datumsguard zu (heute $TODAY, Zieltag 2026-05-22) — No-op, kein Merge."
          fi

      - name: Checkout main (volle Historie)
        if: steps.guard.outputs.proceed == 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Release-Branch nach main mergen
        if: steps.guard.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin release/uc06-2026-05-22
          git merge --no-ff origin/release/uc06-2026-05-22 \
            -m "release: RAMmageddon UC 06 veröffentlicht (terminiert 2026-05-22 03:00 CEST)"
          git push origin main

      - name: Cloudflare-Deploy explizit anstoßen
        if: steps.guard.outputs.proceed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Ein GITHUB_TOKEN-Push triggert die push-basierte deploy.yml
          # NICHT (GitHub-Rekursionsschutz). deploy.yml hat zusätzlich
          # workflow_dispatch -> hier explizit auf main anstoßen, damit
          # der frisch gemergte main-Stand gebaut und deployt wird.
          gh workflow run deploy.yml --ref main
          echo "::notice::deploy.yml auf main angestoßen — Cloudflare Pages baut/deployt."
